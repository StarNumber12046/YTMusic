name: Build Linux

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Build API
        working-directory: ./api
        run: |
          CGO_ENABLED=1 go build -o ytmusic-api .

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: ytmusic-api-linux
          path: api/ytmusic-api

  gui:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install GTK3
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libgl1-mesa-glx libx11-dev libxcb-util-dev libxcb-cursor-dev libxkbcommon-x11-dev libxdo-dev libssl-dev libayatana-appindicator3-dev

      - name: Build GUI
        working-directory: ./gui
        run: |
          CGO_ENABLED=1 go build -o ytmusic-gui .

      - name: Upload GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ytmusic-gui-linux
          path: gui/ytmusic-gui

  tui:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build TUI
        working-directory: ./tui
        run: |
          CGO_ENABLED=1 go build -o ytmusic-tui .

      - name: Upload TUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ytmusic-tui-linux
          path: tui/ytmusic-tui

  plasmoid:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install KDE Plasma SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y plasma-sdk

      - name: Package Plasmoid
        working-directory: ./plasmoid
        run: |
          mkdir -p ytmusic-plasmoid
          cp -r contents ytmusic-plasmoid/
          cp metadata.json ytmusic-plasmoid/
          tar -czvf ytmusic-plasmoid.tar.gz ytmusic-plasmoid/

      - name: Upload Plasmoid artifact
        uses: actions/upload-artifact@v4
        with:
          name: ytmusic-plasmoid-linux
          path: plasmoid/ytmusic-plasmoid.tar.gz

  release:
    needs: [api, gui, tui, plasmoid]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ytmusic-api-linux/ytmusic-api
            ytmusic-gui-linux/ytmusic-gui
            ytmusic-tui-linux/ytmusic-tui
            ytmusic-plasmoid-linux/ytmusic-plasmoid.tar.gz
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
